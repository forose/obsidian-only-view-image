name: Release Obsidian plugin

on:
    push:
        tags:
            - '*.*.*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Lint check
              run: npm run lint

            - name: Validate manifest
              run: |
                  node -e "
                    const m = require('./manifest.json');
                    if (!m.id || m.id.includes(' ')) { console.error('manifest.json id 无效，不能包含空格'); process.exit(1); }
                    if (!m.version) { console.error('manifest.json 缺少 version'); process.exit(1); }
                    if (!m.minAppVersion) { console.error('manifest.json 缺少 minAppVersion'); process.exit(1); }
                    console.log('manifest.json 验证通过: ' + m.id + '@' + m.version);
                  "

            - name: Verify version match
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  # 去除常见的 tag 前缀（v、v-、release- 等）
                  clean_tag=$(echo "$tag" | sed -E 's/^(v-|v|release-)//')
                  manifest_version=$(node -p "require('./manifest.json').version")
                  if [ "$clean_tag" != "$manifest_version" ]; then
                    echo "错误: tag ($tag -> $clean_tag) 与 manifest.json version ($manifest_version) 不一致"
                    exit 1
                  fi
                  echo "版本匹配: $clean_tag"

            - name: Package plugin
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  clean_tag=$(echo "$tag" | sed -E 's/^(v-|v|release-)//')
                  mkdir -p dist
                  cp main.js manifest.json styles.css dist/
                  cd dist
                  zip -r ../obsidian-image-tools-${clean_tag}.zip main.js manifest.json styles.css
                  cd ..

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  clean_tag=$(echo "$tag" | sed -E 's/^(v-|v|release-)//')

                  gh release create "$tag" \
                    --title="$clean_tag" \
                    --draft \
                    main.js manifest.json styles.css obsidian-image-tools-${clean_tag}.zip
